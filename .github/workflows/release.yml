name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  test:
    name: Run Tests Before Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-mock

      - name: Run full test suite
        run: python -m pytest tests/ -v --tb=short

  build:
    name: Build ${{ matrix.os }}
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: VoxelSandbox-linux
            archive: VoxelSandbox-linux.tar.gz
          - os: windows-latest
            artifact: VoxelSandbox-windows
            archive: VoxelSandbox-windows.zip
          - os: macos-latest
            artifact: VoxelSandbox-macos
            archive: VoxelSandbox-macos.tar.gz

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build executable
        run: pyinstaller game.spec --noconfirm

      - name: Package Linux build
        if: runner.os == 'Linux'
        run: tar -czf ${{ matrix.archive }} -C dist VoxelSandbox

      - name: Package macOS build
        if: runner.os == 'macOS'
        run: tar -czf ${{ matrix.archive }} -C dist VoxelSandbox

      - name: Package Windows build
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path dist\VoxelSandbox -DestinationPath ${{ matrix.archive }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.archive }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist-artifacts/**/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
